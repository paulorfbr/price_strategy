name: Deploy to AWS

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_frontend:
        description: 'Deploy frontend (S3 + CloudFront)'
        type: boolean
        default: true
      deploy_backend:
        description: 'Deploy backend (ECS Fargate)'
        type: boolean
        default: true

env:
  AWS_REGION: eu-west-1
  ECR_REPOSITORY: prix-strategie
  ECS_CLUSTER: prix-strategie-cluster
  ECS_SERVICE: prix-strategie-service
  ECS_TASK_FAMILY: prix-strategie

permissions:
  id-token: write   # OIDC authentication
  contents: read

jobs:
  # ── Detect which paths changed ─────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend:  ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'index.html'
              - 'js/**'
              - 'css/**'
              - 'partials/**'
            backend:
              - 'src/**'
              - 'pom.xml'
              - 'Dockerfile'

  # ── Frontend: sync static files to S3 + invalidate CDN ─────
  deploy-frontend:
    needs: changes
    if: |
      needs.changes.outputs.frontend == 'true' ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy_frontend)
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync index.html (no-cache)
        run: |
          aws s3 cp index.html \
            s3://${{ secrets.S3_BUCKET_NAME }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html; charset=utf-8"

      - name: Sync JS files (long-term cache)
        run: |
          aws s3 sync js/ \
            s3://${{ secrets.S3_BUCKET_NAME }}/js/ \
            --cache-control "public, max-age=31536000, immutable" \
            --delete

      - name: Sync CSS files (long-term cache)
        run: |
          aws s3 sync css/ \
            s3://${{ secrets.S3_BUCKET_NAME }}/css/ \
            --cache-control "public, max-age=31536000, immutable" \
            --delete

      - name: Sync HTML partials (short cache)
        run: |
          aws s3 sync partials/ \
            s3://${{ secrets.S3_BUCKET_NAME }}/partials/ \
            --cache-control "public, max-age=3600" \
            --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      - name: Print frontend URL
        run: echo "Frontend deployed → https://${{ secrets.CLOUDFRONT_DOMAIN }}"

  # ── Backend: build Docker image, push to ECR, deploy to ECS ─
  deploy-backend:
    needs: changes
    if: |
      needs.changes.outputs.backend == 'true' ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy_backend)
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        run: mvn test -q

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push Docker image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            --tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            --tag $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            --cache-from $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Download current ECS task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ env.ECS_TASK_FAMILY }} \
            --query taskDefinition \
            > task-definition.json

      - name: Update task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.ECR_REPOSITORY }}
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
          codedeploy-appspec: false

      - name: Print backend URL
        run: echo "Backend API deployed → https://${{ secrets.ALB_DNS_NAME }}/api/v1"
